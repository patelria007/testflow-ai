<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TestFlow AI{% endblock %}</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #a5b4fc;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent-green: #34d399;
      --accent-red: #f87171;
      --accent-yellow: #fbbf24;
      --border: #475569;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
      z-index: -1;
    }

    /* Navbar */
    nav {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(71, 85, 105, 0.5);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 1.25rem;
    }

    .nav-brand .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: rgba(99, 102, 241, 0.15);
    }

    /* Main content */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
    }

    /* Cards */
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .card-centered {
      max-width: 440px;
      margin: 4rem auto;
    }

    .card-wide {
      max-width: 800px;
      margin: 2rem auto;
    }

    /* Page header */
    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    input::placeholder, textarea::placeholder {
      color: #64748b;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #3b4c63;
    }

    .btn-full {
      width: 100%;
    }

    /* Flash messages */
    .flash {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      animation: slideDown 0.3s ease;
    }

    .flash-success {
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: var(--accent-green);
    }

    .flash-error {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--accent-red);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(71, 85, 105, 0.3);
      font-size: 0.95rem;
    }

    /* Status badge */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .status-not-run {
      background: rgba(251, 191, 36, 0.15);
      color: var(--accent-yellow);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .status-passed {
      background: rgba(52, 211, 153, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .status-failed {
      background: rgba(248, 113, 113, 0.15);
      color: var(--accent-red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state p {
      margin-bottom: 1.5rem;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Header actions row */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  {% block navbar %}{% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    TestFlow AI &mdash; Intelligent Test Automation
  </footer>
</body>
</html>
